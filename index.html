<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>539 開獎大數據歷史清單</title>
    
    <style>
        html, body {
            width: 1200px;
            min-width: 1200px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0;
            background-color: #121212; /* 黑底 */
            color: #ffffff;            /* 白字 */
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .app-container {
            width: 1200px;
            box-sizing: border-box;
            padding: 20px;
        }

        h2 {
            color: #ffb703;
            margin-bottom: 20px;
        }

        /* 剛好滿 1200px 的表格 */
        .data-table {
            width: 1160px;
            border-collapse: collapse;
            font-size: 22px;
            text-align: center;
        }

        .data-table th, .data-table td {
            border: 1px solid #444444;
            padding: 15px;
        }

        .data-table th {
            background-color: #222222;
            color: #00b4d8;
        }

        .data-table tr:nth-child(even) {
            background-color: #1a1a1a;
        }

        /* 號碼球 */
        .num-ball {
            display: inline-block;
            width: 45px;
            height: 45px;
            line-height: 45px;
            border-radius: 50%;
            background-color: #e63946;
            color: white;
            font-weight: bold;
            margin: 0 8px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>539 開獎大數據歷史清單</h2>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th style="width: 300px;">開獎日期</th>
                    <th>開出號碼 (從小到大)</th>
                </tr>
            </thead>
            <tbody id="data-list">
                </tbody>
        </table>
    </div>

    <script>
        // 🚨 老哥！最新的開獎數據直接黏在這裡，不讀外部檔案了，絕對不會錯！
        // 每天開獎後，你只要手動把新的一行像這樣補在最上面就可以了！
        const myData = [
            ["2026-05-23(六)", "05", "12", "18", "25", "33"],
            ["2026-05-22(五)", "01", "08", "19", "22", "30"],
            ["2026-05-21(四)", "10", "15", "23", "29", "35"],
            ["2026-05-20(三)", "04", "11", "17", "26", "31"]
        ];

        const tbody = document.getElementById('data-list');
        
        myData.forEach(row => {
            const date = row[0]; // 日期
            
            // 拿後面的5個號碼，轉成數字並排序（從小到大）
            const numbers = row.slice(1)
                               .map(Number)
                               .sort((a, b) => a - b);
            
            // 補齊兩位數
            const formattedNumbers = numbers.map(num => String(num).padStart(2, '0'));

            let tr = document.createElement('tr');
            
            // 放日期
            let tdDate = document.createElement('td');
            tdDate.innerText = date;
            tr.appendChild(tdDate);
            
            // 放號碼球
            let tdNums = document.createElement('td');
            formattedNumbers.forEach(num => {
                let span = document.createElement('span');
                span.className = 'num-ball';
                span.innerText = num;
                tdNums.appendChild(span);
            });
            tr.appendChild(tdNums);
            
            tbody.appendChild(tr);
        });
    </script>

</body>
</html>
